worker_processes  auto;
worker_rlimit_nofile 65536;

events {
    worker_connections  8192;
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    tcp_nopush on;
    tcp_nodelay on;
    sendfile        on;
    keepalive_timeout  65;
    include /etc/nginx/conf.d/*.conf;
}
